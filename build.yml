name: Build Dev Client APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          package-manager-cache: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Patch RNTP — Kotlin 2.x compatibility
        run: |
          MUSIC_MODULE="node_modules/react-native-track-player/android/src/main/java/com/doublesymmetry/trackplayer/module/MusicModule.kt"
          MUSIC_SERVICE="node_modules/react-native-track-player/android/src/main/java/com/doublesymmetry/trackplayer/service/MusicService.kt"

          echo "=== Patching MusicModule.kt ==="
          # Fix 1: getTrack - Arguments.fromBundle(track.originalItem)
          sed -i 's/Arguments\.fromBundle(musicService\.tracks\[index\]\.originalItem)/Arguments.fromBundle(musicService.tracks[index].originalItem ?: Bundle())/g' "$MUSIC_MODULE"
          # Fix 2: getActiveTrack - Arguments.fromBundle(originalItem)
          sed -i 's/Arguments\.fromBundle(\n\s*musicService\.tracks\[musicService\.getCurrentTrackIndex()\]\.originalItem\n\s*)/Arguments.fromBundle(musicService.tracks[musicService.getCurrentTrackIndex()].originalItem ?: Bundle())/g' "$MUSIC_MODULE"
          # Fix 2 alt: single line version
          sed -i '/Arguments\.fromBundle(/{N; s/Arguments\.fromBundle(\n\s*musicService\.tracks\[musicService\.getCurrentTrackIndex()\]\.originalItem/Arguments.fromBundle(musicService.tracks[musicService.getCurrentTrackIndex()].originalItem ?: Bundle()/}' "$MUSIC_MODULE"
          
          echo "=== Patching MusicService.kt ==="
          # Fix 3: putBundle track.originalItem
          sed -i 's/b\.putBundle("track", tracks\[player\.currentIndex\]\.originalItem)/b.putBundle("track", tracks[player.currentIndex].originalItem ?: Bundle())/g' "$MUSIC_SERVICE"
          # Fix 4: putBundle lastTrack
          sed -i 's/b\.putBundle("lastTrack", tracks\[previousIndex\]\.originalItem)/b.putBundle("lastTrack", tracks[previousIndex].originalItem ?: Bundle())/g' "$MUSIC_SERVICE"

          echo "=== Vérification des patches ==="
          grep -n "originalItem" "$MUSIC_MODULE"
          grep -n "originalItem" "$MUSIC_SERVICE"

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: expowoop-dev-client
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
