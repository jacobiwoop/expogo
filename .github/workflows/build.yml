name: Build Dev Client APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Très important pour les nouveaux builds Android
          distribution: 'zulu'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Reste sur 20 pour l'instant, mais surveille 22/24

      - name: Install dependencies
        run: npm install

      - name: Build Android Debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
