name: Build Dev Client APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          package-manager-cache: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Patch RNTP — Kotlin 2.x compatibility
        run: |
          RNTP_PATH="node_modules/react-native-track-player/android/src/main/java/com/doublesymmetry/trackplayer"
          cp patches/rntp/MusicModule.kt "$RNTP_PATH/module/MusicModule.kt"
          cp patches/rntp/MusicService.kt "$RNTP_PATH/service/MusicService.kt"
          echo "✅ Patch appliqué"
          grep -n "originalItem" "$RNTP_PATH/module/MusicModule.kt"
          grep -n "originalItem" "$RNTP_PATH/service/MusicService.kt"

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tail -100

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: expowoop-dev-client
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
